version: '3.8'

services:
  module1:
    build:
      context: .
      dockerfile: Dockerfile.module1
    ports:
      - "5001:5001"
    networks:
      - notification-net

  module2:
    build:
      context: .
      dockerfile: Dockerfile.module2
    ports:
      - "5002:5002"
    networks:
      - notification-net

  module3:
    build:
      context: .
      dockerfile: Dockerfile.module3
    ports:
      - "5003:5003"
    networks:
      - notification-net

networks:
  notification-net:
    driver: bridge
